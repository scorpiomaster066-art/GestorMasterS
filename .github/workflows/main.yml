name: Compilar GestorMasterS APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: Configurar Java 17 (Obligatorio para API 33)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Instalar paquetes base del sistema
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git zip unzip autoconf libtool pkg-config zlib1g-dev libffi-dev libssl-dev cmake ncurses-dev libncurses5-dev libncursesw5-dev

      - name: Usar Python por defecto del sistema
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias de Python modernas
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install cython==0.29.37 buildozer==1.5.0 sh

      - name: Crear buildozer.spec DINÁMICO
        run: |
          cat << 'EOF' > buildozer.spec
          [app]
          title = GestorMasterS
          package.name = gestormasters
          package.domain = org.scorpiomaster066
          source.dir = .
          source.include_exts = py,png,jpg,jpeg,kv,atlas,json,db,tflite,onnx,bin
          source.include_dirs = ModelosIA,.
          android.entrypoint = main.py
          version = 1.0
          requirements = python3,kivy==2.3.0,kivymd==1.2.0,pillow,pyjnius==1.6.0,android
          orientation = portrait
          fullscreen = 0
          android.minapi = 24
          android.api = 33
          android.ndk = 25b
          android.ndk_api = 33
          android.archs = arm64-v8a, armeabi-v7a
          android.permissions = INTERNET, READ_EXTERNAL_STORAGE, WRITE_EXTERNAL_STORAGE
          android.allow_backup = True

          [buildozer]
          log_level = 2
          warn_on_root = 0
          android.accept_sdk_license = True
          android.buildtools = 33.0.2
          EOF

      - name: Compilar APK (64 y 32 bits incorporados)
        run: |
          export BUILDOZER_ALLOW_ROOT=1
          export PYTHONUNBUFFERED=1
          yes | buildozer android debug

      - name: Guardar APK listo
        uses: actions/upload-artifact@v4
        with:
          name: GestorMasterS-FINAL
          path: bin/*.apk
          retention-days: 14
 
