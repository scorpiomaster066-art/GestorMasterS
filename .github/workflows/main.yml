name: Compilar GestorMasterS APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    concurrency:
      group: ${{ github.workflow }}
      cancel-in-progress: true
    steps:
      - uses: actions/checkout@v4

      - name: Instalar paquetes base
        run: |
          sudo apt-get update -y
          sudo apt-get install -y git zip unzip openjdk-11-jdk autoconf libtool pkg-config zlib1g-dev libffi-dev libssl-dev cmake

      - name: Python estable
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Instalar versiones exactas
        run: |
          python -m pip install --upgrade pip
          pip install setuptools==65.5.1 wheel==0.38.4
          pip install cython==0.29.36 buildozer==1.6.0

      - name: Generar buildozer.spec
        run: |
          cat > buildozer.spec << 'END_SPEC'
[app]
title = GestorMasterS
package.name = gestormasters
package.domain = org.scorpiomaster066
source.dir = .
source.include_exts = py,png,jpg,jpeg,kv,atlas,json,db,tflite,onnx,bin
source.include_dirs = ModelosIA,.
android.entrypoint = main.py
version = 1.0
requirements = python3,kivy==2.2.1,kivymd==1.2.0,pillow==9.5.0,pyjnius,android
orientation = portrait
fullscreen = 0
android.minapi = 24
android.api = 33
android.ndk = 25b
android.archs = arm64-v8a,armeabi-v7a
android.permissions = INTERNET,READ_EXTERNAL_STORAGE,WRITE_EXTERNAL_STORAGE
android.allow_backup = True

[buildozer]
log_level = 2
warn_on_root = 0
android.accept_sdk_license = True
END_SPEC

      - name: Compilar APK
        run: |
          export BUILDOZER_ALLOW_ROOT=1
          export JAVA_HOME=/usr/lib/jvm/java-11-openjdk-amd64
          printf 'y\ny\ny\n' | buildozer android debug

      - name: Guardar APK
        uses: actions/upload-artifact@v4
        with:
          name: GestorMasterS-FINAL
          path: bin/*.apk
          retention-days: 7
